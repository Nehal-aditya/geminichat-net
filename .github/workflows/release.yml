name: Release

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER RULES
#
# Stable:    git tag v1.2.3   → push
# Pre-release tags:
#            v1.2.3-alpha.1   v1.2.3-beta.2
#            v1.2.3-rc.1      v1.2.3-preview.1
#
# Manual:    Actions → Release → Run workflow
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'
      - 'v[0-9]+.[0-9]+.[0-9]+-preview*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version — e.g. 1.2.3 or 1.2.3-beta.1'
        required: true
        default: '1.0.0'
      release_type:
        description: 'Release channel'
        required: true
        type: choice
        default: stable
        options: [stable, alpha, beta, rc, preview]
      draft:
        description: 'Publish as draft (review before going live)'
        required: true
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
env:
  APP_NAME:                    GeminiChat
  DOTNET_VERSION:              '8.0.x'
  PROJECT_PATH:                GeminiChat.csproj
  DOTNET_NOLOGO:               true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  WIX_VERSION:                 '5.0.2'
  WIX_UI_EXT_VERSION:          '5.0.1'
  APP_ICON:                    Assets/app.ico

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Resolve version, channel, prerelease flag
  # ───────────────────────────────────────────────────────────────────────────
  version:
    name: Resolve Version & Channel
    runs-on: ubuntu-latest
    outputs:
      version:       ${{ steps.resolve.outputs.version }}
      tag:           ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      channel:       ${{ steps.resolve.outputs.channel }}
      is_draft:      ${{ steps.resolve.outputs.is_draft }}
      display_name:  ${{ steps.resolve.outputs.display_name }}
      msi_version:   ${{ steps.resolve.outputs.msi_version }}

    steps:
      - name: Resolve version metadata
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            IS_DRAFT="false"
          else
            VERSION="${{ github.event.inputs.version }}"
            RTYPE="${{ github.event.inputs.release_type }}"
            IS_DRAFT="${{ github.event.inputs.draft }}"
            if [[ "${RTYPE}" != "stable" && "${VERSION}" != *"-"* ]]; then
              VERSION="${VERSION}-${RTYPE}.1"
            fi
            TAG="v${VERSION}"
          fi

          IS_PRERELEASE="false"
          CHANNEL="stable"
          if   [[ "${VERSION}" == *"-alpha"*   ]]; then CHANNEL="alpha";   IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-beta"*    ]]; then CHANNEL="beta";    IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-rc"*      ]]; then CHANNEL="rc";      IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-preview"* ]]; then CHANNEL="preview"; IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-"*        ]]; then CHANNEL="pre";     IS_PRERELEASE="true"
          fi

          # MSI version must be purely numeric — strip pre-release suffix
          MSI_VERSION="${VERSION%%-*}"

          case "${CHANNEL}" in
            alpha)   DISPLAY="Gemini Chat v${VERSION} (Alpha)" ;;
            beta)    DISPLAY="Gemini Chat v${VERSION} (Beta)" ;;
            rc)      DISPLAY="Gemini Chat v${VERSION} (Release Candidate)" ;;
            preview) DISPLAY="Gemini Chat v${VERSION} (Preview)" ;;
            pre)     DISPLAY="Gemini Chat v${VERSION} (Pre-release)" ;;
            *)       DISPLAY="Gemini Chat v${VERSION}" ;;
          esac

          echo "version=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                     >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}"             >> "$GITHUB_OUTPUT"
          echo "is_draft=${IS_DRAFT}"           >> "$GITHUB_OUTPUT"
          echo "display_name=${DISPLAY}"        >> "$GITHUB_OUTPUT"
          echo "msi_version=${MSI_VERSION}"     >> "$GITHUB_OUTPUT"

          echo "version=${VERSION}  tag=${TAG}  channel=${CHANNEL}  msi_version=${MSI_VERSION}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build portable single-file EXE (x64 + arm64)
  # ───────────────────────────────────────────────────────────────────────────
  build-exe:
    name: Build EXE · ${{ matrix.arch_label }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            arch_label: x64
          - rid: win-arm64
            arch_label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish single-file EXE
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ApplicationIcon="${{ env.APP_ICON }}" `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            -p:InformationalVersion="${{ needs.version.outputs.version }}" `
            --output "publish/${{ matrix.rid }}"

      - name: Rename EXE with arch + channel suffix
        shell: pwsh
        run: |
          $channel = "${{ needs.version.outputs.channel }}"
          $suffix  = if ($channel -ne "stable") { "-$channel" } else { "" }
          $src     = "publish/${{ matrix.rid }}/${{ env.APP_NAME }}.exe"
          $dst     = "publish/${{ matrix.rid }}/${{ env.APP_NAME }}-${{ matrix.arch_label }}${suffix}.exe"
          if (-not (Test-Path $src)) { throw "EXE not found at: $src" }
          Move-Item $src $dst -Force
          Write-Host "Artifact: $dst  ($([int](Get-Item $dst).Length / 1MB) MB)"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/*.exe
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build MSI installer (x64 + arm64)
  #
  # KEY FIX: We publish with PublishSingleFile=true so the output is exactly
  # one .exe file. The WXS then references it explicitly with <File Source=...>
  # keyed as KeyPath="yes", and both shortcuts point at [#MainExe] (the MSI
  # property that resolves to the installed file path). This eliminates the
  # "missing target" shortcut error caused by glob harvesting.
  # ───────────────────────────────────────────────────────────────────────────
  build-msi:
    name: Build MSI · ${{ matrix.arch_label }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        win-x64
            arch_label: x64
            wix_arch:   x64
          - rid:        win-arm64
            arch_label: arm64
            wix_arch:   arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Install WiX CLI pinned to v5.0.2 ──────────────────────────────────
      - name: Install WiX CLI v${{ env.WIX_VERSION }}
        run: dotnet tool install --global wix --version ${{ env.WIX_VERSION }}

      # ── Fetch WixToolset.UI.wixext 5.0.1 directly from NuGet ─────────────
      # Avoids `wix extension add` which ignores version pins and can pull
      # incompatible prerelease builds.
      - name: Fetch WixToolset.UI.wixext v${{ env.WIX_UI_EXT_VERSION }}
        shell: pwsh
        run: |
          $pkg   = "WixToolset.UI.wixext"
          $ver   = "${{ env.WIX_UI_EXT_VERSION }}"
          $dest  = "wixext"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          $url   = "https://www.nuget.org/api/v2/package/$pkg/$ver"
          $nupkg = "$dest/$pkg.$ver.nupkg"
          Invoke-WebRequest -Uri $url -OutFile $nupkg -UseBasicParsing
          Write-Host "Downloaded: $nupkg"

          Expand-Archive -Path $nupkg -DestinationPath "$dest/extracted" -Force

          # Look for the wixext5 subfolder first (correct for WiX v5)
          $dll = Get-ChildItem "$dest/extracted" -Filter "WixToolset.UI.wixext.dll" -Recurse |
                   Where-Object { $_.FullName -match "wixext5" } |
                   Select-Object -First 1

          if (-not $dll) {
            # Fallback: any DLL with that name
            $dll = Get-ChildItem "$dest/extracted" -Filter "WixToolset.UI.wixext.dll" -Recurse |
                     Select-Object -First 1
          }
          if (-not $dll) { throw "WixToolset.UI.wixext.dll not found in package" }

          Write-Host "UI ext DLL → $($dll.FullName)"
          $dll.FullName | Out-File "wixext/ui_ext_dll.txt" -Encoding utf8 -NoNewline

      - name: Restore app
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # ── IMPORTANT: publish as single-file so we get exactly one .exe ──────
      - name: Publish app (single-file for MSI)
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ApplicationIcon="${{ env.APP_ICON }}" `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            -p:InformationalVersion="${{ needs.version.outputs.version }}" `
            --output "msi-src/${{ matrix.rid }}"

          # Verify the exe exists before continuing
          $exe = "msi-src/${{ matrix.rid }}/${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Contents of msi-src/${{ matrix.rid }}:"
            Get-ChildItem "msi-src/${{ matrix.rid }}" | ForEach-Object { Write-Host "  $($_.Name)" }
            throw "Expected EXE not found: $exe"
          }
          Write-Host "EXE ready: $exe  ($([int](Get-Item $exe).Length / 1MB) MB)"

      - name: Generate Product.wxs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path wix | Out-Null

          $msiVersion  = "${{ needs.version.outputs.msi_version }}"
          $channel     = "${{ needs.version.outputs.channel }}"
          $rid         = "${{ matrix.rid }}"
          $appName     = "${{ env.APP_NAME }}"
          $exeSrc      = "${{ github.workspace }}\msi-src\$rid\$appName.exe"
          $icoSrc      = "${{ github.workspace }}\${{ env.APP_ICON }}"

          # Stable and pre-release use different upgrade codes so they
          # can coexist side-by-side on the same machine.
          $nameSuffix  = if ($channel -ne "stable") { " ($channel)" } else { "" }
          $displayName = "${appName}${nameSuffix}"
          $upgradeCode = if ($channel -eq "stable") {
            "A1B2C3D4-E5F6-7890-ABCD-EF1234567890"
          } else {
            "B2C3D4E5-F6A7-8901-BCDE-F01234567891"
          }

          # Registry key suffix so stable+prerelease don't collide in HKCU
          $regKey = "Software\GeminiChat\$channel"

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"
              xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">

            <Package Name="$displayName"
                    Manufacturer="GeminiChat"
                    Version="$msiVersion"
                    UpgradeCode="$upgradeCode"
                    Scope="perUser">

              <MajorUpgrade
                DowngradeErrorMessage="A newer version of [ProductName] is already installed. Uninstall it first." />
              <MediaTemplate EmbedCab="yes" CompressionLevel="high" />
              <ui:WixUI Id="WixUI_InstallDir" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />

              <!--
                Icon declaration: WiX embeds the ICO into the MSI and uses it for
                Add/Remove Programs entry. The Id must end in ".exe" or ".ico" so
                WiX knows the resource type.
              -->
              <Icon Id="AppIcon.ico" SourceFile="$icoSrc" />
              <Property Id="ARPPRODUCTICON" Value="AppIcon.ico" />

              <Feature Id="MainFeature" Title="$appName" Level="1">
                <ComponentRef Id="MainExeComponent" />
                <ComponentRef Id="ShortcutComponent" />
              </Feature>

              <!-- Install to %LocalAppData%\GeminiChat  (no admin required) -->
              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="INSTALLFOLDER" Name="$displayName" />
              </StandardDirectory>
              <StandardDirectory Id="DesktopFolder" />
              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="AppMenuFolder" Name="$displayName" />
              </StandardDirectory>

              <!--
                MainExeComponent:
                - Explicitly references the single published EXE by full source path.
                - KeyPath="yes" on the <File> element means the MSI tracks this file
                  directly; the shortcuts below reference [#MainExe] which resolves
                  to the correct installed path. This is what fixes the broken shortcut.
              -->
              <Component Id="MainExeComponent"
                        Directory="INSTALLFOLDER"
                        Guid="D4E5F6A7-B8C9-0123-DEFA-123456789003">
                <File Id="MainExe"
                      Source="$exeSrc"
                      Name="$appName.exe"
                      KeyPath="yes" />
              </Component>

              <!--
                ShortcutComponent:
                - Shortcuts use Target="[#MainExe]" — the [#FileId] syntax tells the
                  MSI engine to resolve to the installed location of that File element.
                  This is the only reliable way to create shortcuts in per-user installs.
                - Icon="AppIcon.ico" wires the embedded ICO to both shortcuts so they
                  display the correct icon in the Start Menu and on the Desktop.
                - Anchored by a registry value (required by WiX for non-advertised
                  shortcuts without a file KeyPath in the same component).
              -->
              <Component Id="ShortcutComponent"
                        Directory="INSTALLFOLDER"
                        Guid="E5F6A7B8-C9D0-1234-EFAB-234567890014">
                <RegistryValue Root="HKCU"
                              Key="$regKey"
                              Name="Installed"
                              Type="integer"
                              Value="1"
                              KeyPath="yes" />
                <Shortcut Id="DesktopShortcut"
                          Directory="DesktopFolder"
                          Name="$displayName"
                          Target="[#MainExe]"
                          WorkingDirectory="INSTALLFOLDER"
                          Icon="AppIcon.ico"
                          Advertise="no" />
                <Shortcut Id="StartMenuShortcut"
                          Directory="AppMenuFolder"
                          Name="$appName"
                          Target="[#MainExe]"
                          WorkingDirectory="INSTALLFOLDER"
                          Icon="AppIcon.ico"
                          Advertise="no" />
                <RemoveFolder Id="RemoveAppMenuFolder"
                              Directory="AppMenuFolder"
                              On="uninstall" />
              </Component>

            </Package>
          </Wix>
          "@

          Set-Content -Path "wix/Product.wxs" -Value $wxs -Encoding UTF8
          Write-Host "Generated Product.wxs"
          Write-Host "  display : $displayName"
          Write-Host "  exe src : $exeSrc"
          Write-Host "  ico src : $icoSrc"
          Write-Host "  channel : $channel"
          Write-Host "  arch    : ${{ matrix.wix_arch }}"

      - name: Build MSI
        shell: pwsh
        run: |
          $channel  = "${{ needs.version.outputs.channel }}"
          $suffix   = if ($channel -ne "stable") { "-$channel" } else { "" }
          $outName  = "${{ env.APP_NAME }}-${{ matrix.arch_label }}${suffix}.msi"
          $uiExtDll = (Get-Content "wixext/ui_ext_dll.txt" -Raw).Trim()

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Write-Host "Building: $outName"
          Write-Host "UI ext:   $uiExtDll"

          wix build wix/Product.wxs `
            -arch ${{ matrix.wix_arch }} `
            -ext "$uiExtDll" `
            -o "dist/$outName"

          $size = '{0:N1}' -f ((Get-Item "dist/$outName").Length / 1MB)
          Write-Host "Done: dist/$outName  (${size} MB)"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-${{ matrix.rid }}
          path: dist/*.msi
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Create GitHub Release with all assets
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [version, build-exe, build-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate release notes
        shell: bash
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          VERSION="${{ needs.version.outputs.version }}"

          case "${CHANNEL}" in
            alpha)   BANNER="⚠️ **Alpha** — Early preview. May be unstable. Not for production." ;;
            beta)    BANNER="🔶 **Beta** — Feature-complete but may contain bugs. Feedback welcome." ;;
            rc)      BANNER="🔷 **Release Candidate** — Please test and report issues before stable." ;;
            preview) BANNER="🔵 **Preview** — Showcases upcoming features. May change before stable." ;;
            *)       BANNER="✅ **Stable Release** — Recommended for all users." ;;
          esac

          SUFFIX=""
          [[ "${CHANNEL}" != "stable" ]] && SUFFIX="-${CHANNEL}"

          cat > release_notes.md << EOMD
          ## ${{ needs.version.outputs.display_name }}

          ${BANNER}

          ---

          ### 📦 Downloads

          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-x64${SUFFIX}.exe\` | Windows 11 x86-64 | Portable — run directly |
          | \`GeminiChat-arm64${SUFFIX}.exe\` | Windows 11 ARM64 | Portable — run directly |
          | \`GeminiChat-x64${SUFFIX}.msi\` | Windows 11 x86-64 | Installer with shortcuts |
          | \`GeminiChat-arm64${SUFFIX}.msi\` | Windows 11 ARM64 | Installer with shortcuts |

          > **Which file?** Most Windows PCs use **x64**. ARM64 is for Snapdragon X / Copilot+ PCs, Surface Pro X, etc.
          > The MSI installs to \`%LocalAppData%\\GeminiChat\` — no administrator rights required.

          ---

          ### 🤖 Supported Models

          | Model | API ID |
          |-------|--------|
          | Gemini 2.5 Flash | \`gemini-2.5-flash\` |
          | Gemini 2.5 Pro | \`gemini-2.5-pro\` |
          | Gemini 2.5 Flash Lite | \`gemini-2.5-flash-lite\` |
          | Gemini 3 Flash | \`gemini-3-flash-preview\` |
          | Gemini 3.1 Pro | \`gemini-3.1-pro-preview\` |
          | Gemini 3.1 Flash Lite | \`gemini-3.1-flash-lite-preview\` |

          ---

          ### 🚀 Getting Started

          1. Download the \`.msi\` for your architecture and run it (or use the portable \`.exe\`)
          2. Get a free API key at [aistudio.google.com/apikey](https://aistudio.google.com/apikey)
          3. Launch **Gemini Chat**, paste your key, click **Validate & Save**

          ---

          **Full changelog:** [\`${VERSION}\`](../../commits/${{ needs.version.outputs.tag }})
          EOMD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.version.outputs.tag }}
          name:        ${{ needs.version.outputs.display_name }}
          body_path:   release_notes.md
          draft:       ${{ needs.version.outputs.is_draft }}
          prerelease:  ${{ needs.version.outputs.is_prerelease }}
          make_latest: ${{ needs.version.outputs.is_prerelease == 'false' }}
          files: |
            artifacts/exe-win-x64/*.exe
            artifacts/exe-win-arm64/*.exe
            artifacts/msi-win-x64/*.msi
            artifacts/msi-win-arm64/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
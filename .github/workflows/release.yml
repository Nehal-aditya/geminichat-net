      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.version.outputs.tag }}
          name:        ${{ needs.version.outputs.display_name }}
          body_path:   release_notes.md
          draft:       ${{ needs.version.outputs.is_draft }}
          prerelease:  ${{ needs.version.outputs.is_prerelease }}
          make_latest: ${{ needs.version.outputs.is_prerelease == 'false' }}
          files: |
            artifacts/exe-win-x64/*.exe
            artifacts/exe-win-arm64/*.exe
            artifacts/msi-win-x64/*.msi
            artifacts/msi-win-arm64/*.msi
            artifacts/deb-linux-x64/*.deb
            artifacts/deb-linux-arm64/*.deb
            artifacts/rpm-linux-x64/*.rpm
            artifacts/rpm-linux-arm64/*.rpm
            artifacts/dmg-osx-x64/*.dmg
            artifacts/dmg-osx-arm64/*.dmg
            artifacts/pdb-win-win-x64/*.pdb.zip
            artifacts/pdb-win-win-arm64/*.pdb.zip
            artifacts/pdb-linux-linux-x64/*.pdb.zip
            artifacts/pdb-linux-linux-arm64/*.pdb.zip
            artifacts/pdb-macos-osx-x64/*.pdb.zip
            artifacts/pdb-macos-osx-arm64/*.pdb.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
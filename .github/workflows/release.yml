name: Release

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER RULES
#
# Stable:      git tag v1.2.3
# Pre-release: git tag v1.2.3-alpha.1 / -beta.2 / -rc.1 / -preview.1
# Manual:      Actions → Release → Run workflow
#
# ARTIFACTS PRODUCED PER RELEASE
# ┌─────────────────────────────────────────────┬────────────────────────────┐
# │ Windows                                     │ Linux                      │
# │  GeminiChat-x64.exe        portable         │  GeminiChat-x64.deb        │
# │  GeminiChat-arm64.exe      portable         │  GeminiChat-arm64.deb      │
# │  GeminiChat-x64.msi        installer        │  GeminiChat-x64.rpm        │
# │  GeminiChat-arm64.msi      installer        │  GeminiChat-arm64.rpm      │
# ├─────────────────────────────────────────────┼────────────────────────────┤
# │ macOS                                       │ Debug symbols (all)        │
# │  GeminiChat-macos-x64.dmg  Intel            │  GeminiChat-x64.pdb.zip    │
# │  GeminiChat-macos-arm64.dmg Apple Silicon   │  GeminiChat-arm64.pdb.zip  │
# └─────────────────────────────────────────────┴────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'
      - 'v[0-9]+.[0-9]+.[0-9]+-preview*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version — e.g. 1.2.3 or 1.2.3-beta.1'
        required: true
        default: '1.0.0'
      release_type:
        description: 'Release channel'
        required: true
        type: choice
        default: stable
        options: [stable, alpha, beta, rc, preview]
      draft:
        description: 'Publish as draft (review before going live)'
        required: true
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
env:
  APP_NAME:                    GeminiChat
  APP_ID:                      com.geminichat.app          # macOS bundle ID
  DOTNET_VERSION:              '8.0.x'
  PROJECT_PATH:                GeminiChat.csproj
  DOTNET_NOLOGO:               true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  WIX_VERSION:                 '5.0.2'
  WIX_UI_EXT_VERSION:          '5.0.1'
  APP_ICON:                    Assets/app.ico
  APP_ICON_PNG:                Assets/app.png              # used by Linux .desktop + macOS
  DEB_MAINTAINER:              'GeminiChat <noreply@geminichat.app>'
  DEB_DESCRIPTION:             'AI chatbot powered by Google Gemini'
  RPM_SUMMARY:                 'AI chatbot powered by Google Gemini'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Resolve version, channel, prerelease flag
  # ───────────────────────────────────────────────────────────────────────────
  version:
    name: Resolve Version & Channel
    runs-on: ubuntu-latest
    outputs:
      version:       ${{ steps.resolve.outputs.version }}
      tag:           ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      channel:       ${{ steps.resolve.outputs.channel }}
      is_draft:      ${{ steps.resolve.outputs.is_draft }}
      display_name:  ${{ steps.resolve.outputs.display_name }}
      msi_version:   ${{ steps.resolve.outputs.msi_version }}

    steps:
      - name: Resolve version metadata
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            IS_DRAFT="false"
          else
            VERSION="${{ github.event.inputs.version }}"
            RTYPE="${{ github.event.inputs.release_type }}"
            IS_DRAFT="${{ github.event.inputs.draft }}"
            if [[ "${RTYPE}" != "stable" && "${VERSION}" != *"-"* ]]; then
              VERSION="${VERSION}-${RTYPE}.1"
            fi
            TAG="v${VERSION}"
          fi

          IS_PRERELEASE="false"
          CHANNEL="stable"
          if   [[ "${VERSION}" == *"-alpha"*   ]]; then CHANNEL="alpha";   IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-beta"*    ]]; then CHANNEL="beta";    IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-rc"*      ]]; then CHANNEL="rc";      IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-preview"* ]]; then CHANNEL="preview"; IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-"*        ]]; then CHANNEL="pre";     IS_PRERELEASE="true"
          fi

          MSI_VERSION="${VERSION%%-*}"

          case "${CHANNEL}" in
            alpha)   DISPLAY="Gemini Chat v${VERSION} (Alpha)" ;;
            beta)    DISPLAY="Gemini Chat v${VERSION} (Beta)" ;;
            rc)      DISPLAY="Gemini Chat v${VERSION} (Release Candidate)" ;;
            preview) DISPLAY="Gemini Chat v${VERSION} (Preview)" ;;
            pre)     DISPLAY="Gemini Chat v${VERSION} (Pre-release)" ;;
            *)       DISPLAY="Gemini Chat v${VERSION}" ;;
          esac

          echo "version=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                     >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}"             >> "$GITHUB_OUTPUT"
          echo "is_draft=${IS_DRAFT}"           >> "$GITHUB_OUTPUT"
          echo "display_name=${DISPLAY}"        >> "$GITHUB_OUTPUT"
          echo "msi_version=${MSI_VERSION}"     >> "$GITHUB_OUTPUT"

          echo "version=${VERSION}  tag=${TAG}  channel=${CHANNEL}  msi_version=${MSI_VERSION}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Windows: portable single-file EXE + debug PDB (x64 + arm64)
  # ───────────────────────────────────────────────────────────────────────────
  build-exe:
    name: Windows EXE · ${{ matrix.arch_label }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            arch_label: x64
          - rid: win-arm64
            arch_label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # ── Release build (portable, single file) ─────────────────────────────
      - name: Publish release EXE
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ApplicationIcon="${{ env.APP_ICON }}" `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            -p:InformationalVersion="${{ needs.version.outputs.version }}" `
            --output "publish/release/${{ matrix.rid }}"

      # ── Debug build — produces .pdb alongside the binary ──────────────────
      - name: Publish debug EXE (for symbols)
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Debug `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            --output "publish/debug/${{ matrix.rid }}"

      - name: Rename & verify EXE
        shell: pwsh
        run: |
          $channel = "${{ needs.version.outputs.channel }}"
          $suffix  = if ($channel -ne "stable") { "-$channel" } else { "" }
          $src = "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}.exe"
          $dst = "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}-${{ matrix.arch_label }}${suffix}.exe"
          if (-not (Test-Path $src)) { throw "EXE not found: $src" }
          Move-Item $src $dst -Force
          Write-Host "EXE: $dst  ($([int](Get-Item $dst).Length / 1MB) MB)"

      - name: Collect PDB files
        shell: pwsh
        run: |
          $channel = "${{ needs.version.outputs.channel }}"
          $suffix  = if ($channel -ne "stable") { "-$channel" } else { "" }
          $pdbDir  = "publish/debug/${{ matrix.rid }}"
          $zipName = "${{ env.APP_NAME }}-${{ matrix.arch_label }}-win${suffix}.pdb.zip"
          $pdbs    = Get-ChildItem $pdbDir -Filter "*.pdb" -Recurse
          if ($pdbs.Count -eq 0) { Write-Warning "No PDB files found — debug symbols unavailable" }
          else {
            Compress-Archive -Path ($pdbs | Select-Object -ExpandProperty FullName) `
              -DestinationPath "publish/debug/$zipName" -Force
            Write-Host "PDB zip: $zipName  ($($pdbs.Count) files)"
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ matrix.rid }}
          path: publish/release/${{ matrix.rid }}/*.exe
          if-no-files-found: error
          retention-days: 3

      - name: Upload PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdb-win-${{ matrix.rid }}
          path: publish/debug/*.pdb.zip
          if-no-files-found: warn
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Windows: MSI installer (x64 + arm64)
  #
  # FIX: Heredoc closing "@  must be at column 0 in PowerShell.
  #      Using a helper function to build the WXS string avoids heredoc
  #      indentation issues entirely.
  # FIX: Component GUIDs changed to Guid="*" so WiX auto-derives stable
  #      per-path GUIDs, preventing collisions between channel installs.
  # ───────────────────────────────────────────────────────────────────────────
  build-msi:
    name: Windows MSI · ${{ matrix.arch_label }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        win-x64
            arch_label: x64
            wix_arch:   x64
          - rid:        win-arm64
            arch_label: arm64
            wix_arch:   arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WiX CLI v${{ env.WIX_VERSION }}
        run: dotnet tool install --global wix --version ${{ env.WIX_VERSION }}

      - name: Fetch WixToolset.UI.wixext v${{ env.WIX_UI_EXT_VERSION }} from NuGet
        shell: pwsh
        run: |
          $pkg   = "WixToolset.UI.wixext"
          $ver   = "${{ env.WIX_UI_EXT_VERSION }}"
          $dest  = "wixext"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          $url   = "https://www.nuget.org/api/v2/package/$pkg/$ver"
          $nupkg = "$dest/$pkg.$ver.nupkg"
          Invoke-WebRequest -Uri $url -OutFile $nupkg -UseBasicParsing
          Expand-Archive -Path $nupkg -DestinationPath "$dest/extracted" -Force

          $dll = Get-ChildItem "$dest/extracted" -Filter "WixToolset.UI.wixext.dll" -Recurse |
                   Where-Object { $_.FullName -match "wixext5" } | Select-Object -First 1
          if (-not $dll) {
            $dll = Get-ChildItem "$dest/extracted" -Filter "WixToolset.UI.wixext.dll" -Recurse |
                     Select-Object -First 1
          }
          if (-not $dll) { throw "WixToolset.UI.wixext.dll not found in package" }

          Write-Host "UI ext DLL → $($dll.FullName)"
          $dll.FullName | Out-File "wixext/ui_ext_dll.txt" -Encoding utf8 -NoNewline

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish (single-file for MSI)
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ApplicationIcon="${{ env.APP_ICON }}" `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            -p:InformationalVersion="${{ needs.version.outputs.version }}" `
            --output "msi-src/${{ matrix.rid }}"

          $exe = "msi-src/${{ matrix.rid }}/${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem "msi-src/${{ matrix.rid }}" | ForEach-Object { Write-Host "  $($_.Name)" }
            throw "Expected EXE not found: $exe"
          }
          Write-Host "EXE ready: $exe  ($([int](Get-Item $exe).Length / 1MB) MB)"

      # FIX: WXS is written line-by-line with Add-Content to avoid PowerShell
      #      heredoc indentation bugs (closing "@ must be at column 0, which
      #      conflicts with YAML step indentation). This approach is immune to
      #      that constraint entirely.
      # FIX: Component Guid="*" lets WiX auto-generate stable GUIDs from the
      #      install path, preventing GUID collisions between stable and
      #      pre-release channel installs on the same machine.
      - name: Generate Product.wxs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path wix | Out-Null

          $msiVersion  = "${{ needs.version.outputs.msi_version }}"
          $channel     = "${{ needs.version.outputs.channel }}"
          $rid         = "${{ matrix.rid }}"
          $appName     = "${{ env.APP_NAME }}"
          $exeSrc      = "${{ github.workspace }}\msi-src\$rid\$appName.exe"
          $icoSrc      = "${{ github.workspace }}\${{ env.APP_ICON }}"

          $nameSuffix  = if ($channel -ne "stable") { " ($channel)" } else { "" }
          $displayName = "${appName}${nameSuffix}"
          $upgradeCode = if ($channel -eq "stable") {
            "A1B2C3D4-E5F6-7890-ABCD-EF1234567890"
          } else {
            "B2C3D4E5-F6A7-8901-BCDE-F01234567891"
          }
          $regKey = "Software\GeminiChat\$channel"

          # Build WXS line-by-line — avoids PowerShell heredoc column-0 constraint
          $lines = @(
            '<?xml version="1.0" encoding="UTF-8"?>'
            '<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"'
            '    xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">'
            ''
            "  <Package Name=`"$displayName`""
            '          Manufacturer="GeminiChat"'
            "          Version=`"$msiVersion`""
            "          UpgradeCode=`"$upgradeCode`""
            '          Scope="perUser">'
            ''
            '    <MajorUpgrade'
            '      DowngradeErrorMessage="A newer version of [ProductName] is already installed. Uninstall it first." />'
            '    <MediaTemplate EmbedCab="yes" CompressionLevel="high" />'
            '    <ui:WixUI Id="WixUI_InstallDir" />'
            '    <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />'
            ''
            "    <Icon Id=`"AppIcon.ico`" SourceFile=`"$icoSrc`" />"
            '    <Property Id="ARPPRODUCTICON" Value="AppIcon.ico" />'
            ''
            "    <Feature Id=`"MainFeature`" Title=`"$appName`" Level=`"1`">"
            '      <ComponentRef Id="MainExeComponent" />'
            '      <ComponentRef Id="ShortcutComponent" />'
            '    </Feature>'
            ''
            '    <StandardDirectory Id="LocalAppDataFolder">'
            "      <Directory Id=`"INSTALLFOLDER`" Name=`"$displayName`" />"
            '    </StandardDirectory>'
            '    <StandardDirectory Id="DesktopFolder" />'
            '    <StandardDirectory Id="ProgramMenuFolder">'
            "      <Directory Id=`"AppMenuFolder`" Name=`"$displayName`" />"
            '    </StandardDirectory>'
            ''
            '    <!-- Guid="*" lets WiX derive a stable GUID from the install path,'
            '         preventing collisions between stable and pre-release installs. -->'
            '    <Component Id="MainExeComponent" Directory="INSTALLFOLDER" Guid="*">'
            "      <File Id=`"MainExe`" Source=`"$exeSrc`" Name=`"$appName.exe`" KeyPath=`"yes`" />"
            '    </Component>'
            ''
            '    <Component Id="ShortcutComponent" Directory="INSTALLFOLDER" Guid="*">'
            "      <RegistryValue Root=`"HKCU`" Key=`"$regKey`" Name=`"Installed`""
            '                    Type="integer" Value="1" KeyPath="yes" />'
            "      <Shortcut Id=`"DesktopShortcut`" Directory=`"DesktopFolder`""
            "                Name=`"$displayName`" Target=`"[#MainExe]`""
            '                WorkingDirectory="INSTALLFOLDER" Icon="AppIcon.ico" Advertise="no" />'
            "      <Shortcut Id=`"StartMenuShortcut`" Directory=`"AppMenuFolder`""
            "                Name=`"$appName`" Target=`"[#MainExe]`""
            '                WorkingDirectory="INSTALLFOLDER" Icon="AppIcon.ico" Advertise="no" />'
            '      <RemoveFolder Id="RemoveAppMenuFolder" Directory="AppMenuFolder" On="uninstall" />'
            '    </Component>'
            ''
            '  </Package>'
            '</Wix>'
          )

          $lines | Set-Content -Path "wix/Product.wxs" -Encoding UTF8
          Write-Host "Generated Product.wxs  channel=$channel  arch=${{ matrix.wix_arch }}"
          Write-Host "  display : $displayName"
          Write-Host "  exe src : $exeSrc"
          Write-Host "  ico src : $icoSrc"

      - name: Build MSI
        shell: pwsh
        run: |
          $channel  = "${{ needs.version.outputs.channel }}"
          $suffix   = if ($channel -ne "stable") { "-$channel" } else { "" }
          $outName  = "${{ env.APP_NAME }}-${{ matrix.arch_label }}${suffix}.msi"
          $uiExtDll = (Get-Content "wixext/ui_ext_dll.txt" -Raw).Trim()

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Write-Host "Building: $outName"

          wix build wix/Product.wxs `
            -arch ${{ matrix.wix_arch }} `
            -ext "$uiExtDll" `
            -o "dist/$outName"

          $size = '{0:N1}' -f ((Get-Item "dist/$outName").Length / 1MB)
          Write-Host "Done: dist/$outName  (${size} MB)"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-${{ matrix.rid }}
          path: dist/*.msi
          if-no-files-found: error
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Linux: .deb and .rpm packages (x64 + arm64)
  #
  # FIX 1: All heredocs use <<-DELIMITER with tab-indented bodies so that
  #         leading tabs are stripped. This prevents shell indentation from
  #         bleeding into .desktop and DEBIAN/control files (XDG and dpkg
  #         both require fields at column 0).
  # FIX 2: mkdir -p dist added before dpkg-deb so the output directory
  #         exists before the .deb step tries to write into it.
  # FIX 3: RPM spec %install and %files use literal paths / RPM macros only —
  #         no shell variables, which are undefined at rpmbuild spec-eval time.
  #         Files are staged into $RPM_BUILD_ROOT directly in the %install
  #         section using the standard rpmbuild macro.
  # FIX 4: %dir /opt/<pkg> added to %files so rpm -e removes the directory.
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.pkg }} · ${{ matrix.arch_label }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        linux-x64
            arch_label: x64
            deb_arch:   amd64
            rpm_arch:   x86_64
          - rid:        linux-arm64
            arch_label: arm64
            deb_arch:   arm64
            rpm_arch:   aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            rpm \
            fakeroot \
            imagemagick

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # ── Release publish ────────────────────────────────────────────────────
      - name: Publish release binary
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            -p:FileVersion="${MSI_VER}" \
            -p:InformationalVersion="${{ needs.version.outputs.version }}" \
            --output "publish/release/${{ matrix.rid }}"

          BIN="publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: binary not found at $BIN"
            ls -la "publish/release/${{ matrix.rid }}/" && exit 1
          fi
          chmod +x "$BIN"
          echo "Binary: $BIN ($(du -sh "$BIN" | cut -f1))"

      # ── Debug publish ──────────────────────────────────────────────────────
      - name: Publish debug binary (for symbols)
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Debug \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=portable \
            -p:DebugSymbols=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            --output "publish/debug/${{ matrix.rid }}"

      - name: Collect Linux PDB files
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          ZIP_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}-linux${SUFFIX}.pdb.zip"
          PDBS=$(find "publish/debug/${{ matrix.rid }}" -name "*.pdb" 2>/dev/null)
          if [ -z "$PDBS" ]; then
            echo "WARNING: no .pdb files found"
          else
            zip -j "publish/debug/${ZIP_NAME}" $PDBS
            echo "PDB zip: ${ZIP_NAME}"
          fi

      # ── Prepare icon (PNG required for Linux) ─────────────────────────────
      # FIX: Use imagemagick 'convert' (already installed above) to decode the
      #      ICO file — sips on macOS cannot handle ICO but this job runs on
      #      ubuntu-latest where imagemagick is available.
      - name: Prepare PNG icon
        run: |
          ICON_SRC="${{ env.APP_ICON_PNG }}"
          if [ ! -f "$ICON_SRC" ] && [ -f "${{ env.APP_ICON }}" ]; then
            convert "${{ env.APP_ICON }}"[0] -resize 256x256 assets_icon.png
            ICON_SRC="assets_icon.png"
          elif [ ! -f "$ICON_SRC" ]; then
            convert -size 256x256 xc:'#1E3A8A' \
              -fill '#60A5FA' -font DejaVu-Sans-Bold -pointsize 120 \
              -gravity center -annotate 0 'G' assets_icon.png
            ICON_SRC="assets_icon.png"
          fi
          cp "$ICON_SRC" package_icon.png
          echo "Icon: $ICON_SRC"

      # ── Build .deb ────────────────────────────────────────────────────────
      # FIX: mkdir -p dist before dpkg-deb (previously only created in .rpm step).
      # FIX: All heredocs use <<-EOF with tab-indented bodies so leading tabs
      #      are stripped. This keeps .desktop and DEBIAN/control fields at
      #      column 0, which both XDG and dpkg require.
      - name: Build .deb package
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          PKG_NAME=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          PKG_VER="${{ needs.version.outputs.msi_version }}"
          DEB_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}${SUFFIX}.deb"
          INSTALL_DIR="/opt/$PKG_NAME"
          STAGE="deb_stage"

          # ── Directory tree ─────────────────────────────────────────────
          mkdir -p "${STAGE}/DEBIAN"
          mkdir -p "${STAGE}${INSTALL_DIR}"
          mkdir -p "${STAGE}/usr/local/bin"
          mkdir -p "${STAGE}/usr/share/applications"
          mkdir -p "${STAGE}/usr/share/icons/hicolor/256x256/apps"
          # FIX: create dist/ before dpkg-deb tries to write into it
          mkdir -p dist

          # ── Binary ────────────────────────────────────────────────────
          cp "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}" \
             "${STAGE}${INSTALL_DIR}/${{ env.APP_NAME }}"
          chmod 755 "${STAGE}${INSTALL_DIR}/${{ env.APP_NAME }}"

          # ── Symlink in /usr/local/bin ──────────────────────────────────
          ln -s "${INSTALL_DIR}/${{ env.APP_NAME }}" \
                "${STAGE}/usr/local/bin/$(echo ${{ env.APP_NAME }} | tr '[:upper:]' '[:lower:]')"

          # ── Icon ──────────────────────────────────────────────────────
          cp package_icon.png \
             "${STAGE}/usr/share/icons/hicolor/256x256/apps/${PKG_NAME}.png"

          # ── .desktop entry ────────────────────────────────────────────
          # FIX: <<-EOF strips leading tabs so [Desktop Entry] lands at col 0.
          #      Body lines are indented with a single tab character.
          DISPLAY_SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && DISPLAY_SUFFIX=" ($(echo "${CHANNEL}" | sed 's/^[a-z]/\u&/'))"
          cat > "${STAGE}/usr/share/applications/${PKG_NAME}.desktop" <<-DESKTOP
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=${{ env.APP_NAME }}${DISPLAY_SUFFIX}
          Comment=${{ env.DEB_DESCRIPTION }}
          Exec=${INSTALL_DIR}/${{ env.APP_NAME }}
          Icon=${PKG_NAME}
          Terminal=false
          Categories=Network;Chat;Utility;
          StartupWMClass=${{ env.APP_NAME }}
          DESKTOP

          # ── control file ──────────────────────────────────────────────
          # FIX: <<-EOF strips leading tabs; all field names land at col 0.
          INSTALLED_SIZE=$(du -sk "${STAGE}${INSTALL_DIR}" | cut -f1)
          printf 'Package: %s\n'           "${PKG_NAME}"                        > "${STAGE}/DEBIAN/control"
          printf 'Version: %s\n'           "${PKG_VER}"                         >> "${STAGE}/DEBIAN/control"
          printf 'Architecture: %s\n'      "${{ matrix.deb_arch }}"             >> "${STAGE}/DEBIAN/control"
          printf 'Maintainer: %s\n'        "${{ env.DEB_MAINTAINER }}"          >> "${STAGE}/DEBIAN/control"
          printf 'Installed-Size: %s\n'    "${INSTALLED_SIZE}"                  >> "${STAGE}/DEBIAN/control"
          printf 'Depends: %s\n'           'libx11-6, libice6, libsm6, libfontconfig1' >> "${STAGE}/DEBIAN/control"
          printf 'Section: %s\n'           'net'                                 >> "${STAGE}/DEBIAN/control"
          printf 'Priority: %s\n'          'optional'                            >> "${STAGE}/DEBIAN/control"
          printf 'Homepage: %s\n'          'https://github.com/${{ github.repository }}' >> "${STAGE}/DEBIAN/control"
          printf 'Description: %s\n'       "${{ env.DEB_DESCRIPTION }}"         >> "${STAGE}/DEBIAN/control"
          printf ' %s\n'                   'Google Gemini powered AI chatbot with streaming responses,' >> "${STAGE}/DEBIAN/control"
          printf ' %s\n'                   'persistent chat history, and support for multiple models.' >> "${STAGE}/DEBIAN/control"

          # ── postinst: update icon cache ────────────────────────────────
          cat > "${STAGE}/DEBIAN/postinst" <<-'POSTINST'
          #!/bin/sh
          set -e
          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
            gtk-update-icon-cache -f -t /usr/share/icons/hicolor || true
          fi
          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications || true
          fi
          POSTINST
                  chmod 755 "${STAGE}/DEBIAN/postinst"

          # ── postrm: clean up ──────────────────────────────────────────
          cat > "${STAGE}/DEBIAN/postrm" <<-'POSTRM'
          #!/bin/sh
          set -e
          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
            gtk-update-icon-cache -f -t /usr/share/icons/hicolor || true
          fi
          POSTRM
                  chmod 755 "${STAGE}/DEBIAN/postrm"

          # ── Build ─────────────────────────────────────────────────────
          fakeroot dpkg-deb --build "${STAGE}" "dist/${DEB_NAME}"
          echo "Built: dist/${DEB_NAME}  ($(du -sh "dist/${DEB_NAME}" | cut -f1))"

      # ── Build .rpm ────────────────────────────────────────────────────────
      # FIX: RPM spec %install and %files now use only literal paths and RPM
      #      macros. Shell variables like ${STAGE} and ${INSTALL_DIR} are
      #      undefined when rpmbuild evaluates the spec; they must not appear
      #      in %install, %files, or any other spec section.
      # FIX: %dir /opt/<pkg> added to %files so the directory is owned by the
      #      package and removed cleanly on rpm -e.
      - name: Build .rpm package
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          PKG_NAME=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          PKG_VER="${{ needs.version.outputs.msi_version }}"
          RPM_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}${SUFFIX}.rpm"
          INSTALL_DIR="/opt/$PKG_NAME"
 
          # ── RPM build tree ────────────────────────────────────────────
          RPM_ROOT="${HOME}/rpmbuild"
          mkdir -p "${RPM_ROOT}"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
 
          # ── Stage files into BUILD/stage (rpmbuild never wipes this dir) ──
          # We cannot pre-populate BUILDROOT because rpmbuild's brp-* scripts
          # rm -rf it at the start of %install before our files would be seen.
          # Instead we stage into BUILD/stage, pass that path to the spec as
          # the _stagedir macro, and do the actual install inside %install
          # using %{buildroot} — the only safe place to write payload files.
          STAGE_DIR="${RPM_ROOT}/BUILD/stage"
          mkdir -p "${STAGE_DIR}${INSTALL_DIR}"
          mkdir -p "${STAGE_DIR}/usr/local/bin"
          mkdir -p "${STAGE_DIR}/usr/share/applications"
          mkdir -p "${STAGE_DIR}/usr/share/icons/hicolor/256x256/apps"
 
          cp "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}" \
             "${STAGE_DIR}${INSTALL_DIR}/${{ env.APP_NAME }}"
          chmod 755 "${STAGE_DIR}${INSTALL_DIR}/${{ env.APP_NAME }}"
          cp package_icon.png \
             "${STAGE_DIR}/usr/share/icons/hicolor/256x256/apps/${PKG_NAME}.png"
          ln -sf "${INSTALL_DIR}/${{ env.APP_NAME }}" \
                 "${STAGE_DIR}/usr/local/bin/${PKG_NAME}"
 
          # ── .desktop entry ────────────────────────────────────────────
          DISPLAY_SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && DISPLAY_SUFFIX=" ($(echo "${CHANNEL}" | sed 's/^[a-z]/\u&/'))"
          printf '[Desktop Entry]\n'                              > "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Version=1.0\n'                                 >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Type=Application\n'                            >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Name=%s%s\n' "${{ env.APP_NAME }}" "${DISPLAY_SUFFIX}" >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Comment=%s\n' "${{ env.RPM_SUMMARY }}"        >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Exec=%s/%s\n' "${INSTALL_DIR}" "${{ env.APP_NAME }}"  >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Icon=%s\n' "${PKG_NAME}"                      >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Terminal=false\n'                              >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'Categories=Network;Chat;Utility;\n'            >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
          printf 'StartupWMClass=%s\n' "${{ env.APP_NAME }}"    >> "${STAGE_DIR}/usr/share/applications/${PKG_NAME}.desktop"
 
          # ── SPEC file ─────────────────────────────────────────────────
          # %install copies from %{_stagedir} (our BUILD/stage) into
          # %{buildroot}, which is the correct rpmbuild-managed location.
          # %{_stagedir} is passed in via --define below.
          cat > "${RPM_ROOT}/SPECS/${PKG_NAME}.spec" <<-SPEC
          Name:           ${PKG_NAME}
          Version:        ${PKG_VER}
          Release:        1%{?dist}
          Summary:        ${{ env.RPM_SUMMARY }}
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          BuildArch:      ${{ matrix.rpm_arch }}
          Requires:       libX11, libICE, libSM, fontconfig
        
          %description
          Google Gemini powered AI chatbot with streaming responses,
          persistent chat history, and multiple model support.
        
          %install
          cp -a %{_stagedir}/. %{buildroot}/
        
          %files
          %dir /opt/${PKG_NAME}
          /opt/${PKG_NAME}/${{ env.APP_NAME }}
          /usr/local/bin/${PKG_NAME}
          /usr/share/applications/${PKG_NAME}.desktop
          /usr/share/icons/hicolor/256x256/apps/${PKG_NAME}.png
        
          %post
          /usr/bin/gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true
          /usr/bin/update-desktop-database /usr/share/applications 2>/dev/null || true
        
          %postun
          /usr/bin/gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true
          SPEC
        
          # ── rpmbuild ──────────────────────────────────────────────────
          rpmbuild -bb \
            --define "_topdir ${RPM_ROOT}" \
            --define "_bindir /usr/local/bin" \
            --define "_stagedir ${STAGE_DIR}" \
            "${RPM_ROOT}/SPECS/${PKG_NAME}.spec"
 
          # Find and copy the produced RPM
          RPM_FILE=$(find "${RPM_ROOT}/RPMS" -name "*.rpm" | head -1)
          if [ -z "$RPM_FILE" ]; then
            echo "ERROR: rpmbuild did not produce a .rpm file" && exit 1
          fi
          mkdir -p dist
          cp "$RPM_FILE" "dist/${RPM_NAME}"
          echo "Built: dist/${RPM_NAME}  ($(du -sh "dist/${RPM_NAME}" | cut -f1))"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.rid }}
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 3

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.rid }}
          path: dist/*.rpm
          if-no-files-found: error
          retention-days: 3

      - name: Upload Linux PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdb-linux-${{ matrix.rid }}
          path: publish/debug/*.pdb.zip
          if-no-files-found: warn
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — macOS: .dmg (Intel x64 + Apple Silicon arm64)
  #
  # FIX: sips cannot decode Windows .ico files. If Assets/app.png is absent,
  #      we now use imagemagick's 'convert' (available on macos-latest via
  #      Homebrew) to extract the first frame of the .ico as a PNG, then feed
  #      that into the iconutil pipeline. The fallback order is:
  #        1. Assets/app.png  (preferred — commit this to the repo)
  #        2. convert app.ico[0] → PNG  (requires imagemagick)
  #        3. Skip icns generation with a warning (app ships without icon)
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG · ${{ matrix.arch_label }}
    needs: version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        osx-x64
            arch_label: macos-x64
            display:    Intel (x64)
          - rid:        osx-arm64
            arch_label: macos-arm64
            display:    Apple Silicon (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # ── Release publish ────────────────────────────────────────────────────
      - name: Publish release binary
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            -p:FileVersion="${MSI_VER}" \
            -p:InformationalVersion="${{ needs.version.outputs.version }}" \
            --output "publish/release/${{ matrix.rid }}"

          BIN="publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}"
          [ ! -f "$BIN" ] && { echo "ERROR: $BIN not found"; ls publish/release/${{ matrix.rid }}/; exit 1; }
          chmod +x "$BIN"
          echo "Binary: $BIN ($(du -sh "$BIN" | cut -f1))"

      # ── Debug publish ──────────────────────────────────────────────────────
      - name: Publish debug binary (for symbols)
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Debug \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=portable \
            -p:DebugSymbols=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            --output "publish/debug/${{ matrix.rid }}"

      - name: Collect macOS PDB files
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          ZIP_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}${SUFFIX}.pdb.zip"
          PDBS=$(find "publish/debug/${{ matrix.rid }}" -name "*.pdb" 2>/dev/null || true)
          if [ -z "$PDBS" ]; then
            echo "WARNING: no .pdb files found"
          else
            mkdir -p publish/debug
            zip -j "publish/debug/${ZIP_NAME}" $PDBS
            echo "PDB zip: ${ZIP_NAME}"
          fi

      # ── Build .app bundle ──────────────────────────────────────────────────
      - name: Build .app bundle
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          APP_VER="${{ needs.version.outputs.msi_version }}"
          BUNDLE_ID="${{ env.APP_ID }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          APP_BUNDLE="${{ env.APP_NAME }}.app"

          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"

          # ── Binary ────────────────────────────────────────────────────
          cp "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}" \
             "${APP_BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"
          chmod +x "${APP_BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"

          # ── Info.plist ────────────────────────────────────────────────
          DISPLAY_SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && DISPLAY_SUFFIX=" ($(echo "${CHANNEL}" | sed 's/^[a-z]/\u&/'))"
          COPYRIGHT_YEAR=$(date +%Y)
          cat > "${APP_BUNDLE}/Contents/Info.plist" <<-PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>      <string>${BUNDLE_ID}</string>
            <key>CFBundleName</key>            <string>${{ env.APP_NAME }}${DISPLAY_SUFFIX}</string>
            <key>CFBundleDisplayName</key>     <string>${{ env.APP_NAME }}${DISPLAY_SUFFIX}</string>
            <key>CFBundleExecutable</key>      <string>${{ env.APP_NAME }}</string>
            <key>CFBundleVersion</key>         <string>${APP_VER}</string>
            <key>CFBundleShortVersionString</key> <string>${APP_VER}</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>CFBundleSignature</key>       <string>????</string>
            <key>CFBundleIconFile</key>        <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>  <string>12.0</string>
            <key>NSHighResolutionCapable</key> <true/>
            <key>NSHumanReadableCopyright</key>
              <string>Copyright © ${COPYRIGHT_YEAR} GeminiChat. MIT License.</string>
          </dict>
          </plist>
          PLIST

          # ── Icon: PNG → ICNS ──────────────────────────────────────────
          # FIX: sips cannot decode .ico files. Resolution order:
          #   1. Use Assets/app.png directly if it exists (preferred).
          #   2. Use imagemagick 'convert' to extract ico[0] as PNG.
          #   3. Warn and skip — app ships without a custom icon.
          ICON_SRC=""
          if [ -f "${{ env.APP_ICON_PNG }}" ]; then
            ICON_SRC="${{ env.APP_ICON_PNG }}"
            echo "Icon source: ${ICON_SRC} (PNG)"
          elif [ -f "${{ env.APP_ICON }}" ]; then
            if command -v convert >/dev/null 2>&1; then
              convert "${{ env.APP_ICON }}"[0] -resize 512x512 /tmp/appicon_src.png
              ICON_SRC="/tmp/appicon_src.png"
              echo "Icon source: converted from ${{ env.APP_ICON }} via imagemagick"
            else
              echo "WARNING: imagemagick not available and Assets/app.png missing — skipping icns"
            fi
          else
            echo "WARNING: no icon source found — skipping icns"
          fi

          if [ -n "${ICON_SRC}" ] && [ -f "${ICON_SRC}" ]; then
            ICONSET="/tmp/${{ env.APP_NAME }}.iconset"
            mkdir -p "${ICONSET}"
            for SIZE in 16 32 64 128 256 512; do
              sips -z ${SIZE} ${SIZE} "${ICON_SRC}" \
                --out "${ICONSET}/icon_${SIZE}x${SIZE}.png" 2>/dev/null || true
              sips -z $((SIZE*2)) $((SIZE*2)) "${ICON_SRC}" \
                --out "${ICONSET}/icon_${SIZE}x${SIZE}@2x.png" 2>/dev/null || true
            done
            iconutil -c icns "${ICONSET}" -o \
              "${APP_BUNDLE}/Contents/Resources/AppIcon.icns" 2>/dev/null || true
            echo "icns written: ${APP_BUNDLE}/Contents/Resources/AppIcon.icns"
          fi

          echo "App bundle: ${APP_BUNDLE}"
          ls -lh "${APP_BUNDLE}/Contents/MacOS/"

      # ── (OPTIONAL) Code signing — uncomment when secrets are configured ────
      # - name: Import signing certificate
      #   if: ${{ secrets.MACOS_CERT_BASE64 != '' }}
      #   run: |
      #     echo "${{ secrets.MACOS_CERT_BASE64 }}" | base64 --decode > /tmp/cert.p12
      #     security create-keychain -p "" build.keychain
      #     security import /tmp/cert.p12 -k build.keychain \
      #       -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
      #     security list-keychains -d user -s build.keychain
      #
      # - name: Sign .app bundle
      #   if: ${{ secrets.MACOS_CERT_BASE64 != '' }}
      #   run: |
      #     codesign --deep --force --options runtime \
      #       --sign "Developer ID Application: Your Name (TEAMID)" \
      #       "${{ env.APP_NAME }}.app"
      #
      # - name: Notarize .app
      #   if: ${{ secrets.MACOS_CERT_BASE64 != '' }}
      #   run: |
      #     ditto -c -k --keepParent "${{ env.APP_NAME }}.app" /tmp/app_to_notarize.zip
      #     xcrun notarytool submit /tmp/app_to_notarize.zip \
      #       --apple-id "${{ secrets.MACOS_NOTARIZE_APPLE_ID }}" \
      #       --password "${{ secrets.MACOS_NOTARIZE_PASSWORD }}" \
      #       --team-id "${{ secrets.MACOS_TEAM_ID }}" \
      #       --wait
      #     xcrun stapler staple "${{ env.APP_NAME }}.app"

      # ── Build .dmg ────────────────────────────────────────────────────────
      - name: Build .dmg
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          APP_NAME="${{ env.APP_NAME }}"
          DMG_NAME="${APP_NAME}-${{ matrix.arch_label }}${SUFFIX}.dmg"
          DMG_TITLE="${APP_NAME} ${{ needs.version.outputs.msi_version }}"
          DMG_STAGING="/tmp/dmg_staging"
          DMG_RW="/tmp/${APP_NAME}_rw.dmg"

          mkdir -p dist "${DMG_STAGING}"
          cp -R "${APP_NAME}.app" "${DMG_STAGING}/"

          # Symlink to /Applications for drag-install UX
          ln -s /Applications "${DMG_STAGING}/Applications"

          # Create a read-write sparse DMG, then convert to compressed read-only
          hdiutil create -volname "${DMG_TITLE}" \
            -srcfolder "${DMG_STAGING}" \
            -ov -format UDRW \
            "${DMG_RW}"

          hdiutil convert "${DMG_RW}" \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "dist/${DMG_NAME}"

          SIZE=$(du -sh "dist/${DMG_NAME}" | cut -f1)
          echo "Built: dist/${DMG_NAME}  (${SIZE})"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.rid }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 3

      - name: Upload macOS PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdb-macos-${{ matrix.rid }}
          path: publish/debug/*.pdb.zip
          if-no-files-found: warn
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — Create GitHub Release with ALL assets attached
  #
  # FIX: Supported model list is read from .github/supported-models.md if it
  #      exists, falling back to a clearly-marked placeholder so the release
  #      notes never contain speculative API IDs that may not exist yet.
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [version, build-exe, build-msi, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate release notes
        shell: bash
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          VERSION="${{ needs.version.outputs.version }}"

          case "${CHANNEL}" in
            alpha)   BANNER="⚠️ **Alpha** — Early preview. May be unstable. Not for production." ;;
            beta)    BANNER="🔶 **Beta** — Feature-complete but may contain bugs. Feedback welcome." ;;
            rc)      BANNER="🔷 **Release Candidate** — Please test and report issues before stable." ;;
            preview) BANNER="🔵 **Preview** — Showcases upcoming features. May change before stable." ;;
            *)       BANNER="✅ **Stable Release** — Recommended for all users." ;;
          esac

          S=""
          [ "${CHANNEL}" != "stable" ] && S="-${CHANNEL}"

          # FIX: Read supported model list from a checked-in file so release
          #      notes are never out of sync with what the app actually supports.
          #      Create .github/supported-models.md in your repo with rows like:
          #        | Gemini 2.5 Flash | `gemini-2.5-flash` |
          #      If the file is absent a clear placeholder is emitted instead.
          if [ -f ".github/supported-models.md" ]; then
            MODEL_TABLE=$(cat ".github/supported-models.md")
          else
            MODEL_TABLE="| _(see app settings for supported models)_ | — |"
          fi

          cat > release_notes.md << EOMD
          ## ${{ needs.version.outputs.display_name }}

          ${BANNER}

          ---

          ### 📦 Downloads

          #### 🪟 Windows
          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-x64${S}.exe\` | x86-64 | Portable — run directly, no install |
          | \`GeminiChat-arm64${S}.exe\` | ARM64 | Portable — run directly, no install |
          | \`GeminiChat-x64${S}.msi\` | x86-64 | Installer — Desktop + Start Menu shortcuts |
          | \`GeminiChat-arm64${S}.msi\` | ARM64 | Installer — Desktop + Start Menu shortcuts |

          > MSI installs to \`%LocalAppData%\\GeminiChat\` — no administrator rights required.
          > ARM64 is for Snapdragon X / Copilot+ PCs, Surface Pro X, etc.

          #### 🐧 Linux
          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-x64${S}.deb\` | x86-64 | Debian / Ubuntu / Mint |
          | \`GeminiChat-arm64${S}.deb\` | ARM64 | Debian / Ubuntu / Mint |
          | \`GeminiChat-x64${S}.rpm\` | x86-64 | Fedora / RHEL / openSUSE |
          | \`GeminiChat-arm64${S}.rpm\` | ARM64 | Fedora / RHEL / openSUSE |

          > Install .deb: \`sudo dpkg -i GeminiChat-x64${S}.deb\`
          > Install .rpm: \`sudo rpm -i GeminiChat-x64${S}.rpm\`
          > Installs to \`/opt/geminichat/\` with symlink in \`/usr/local/bin/\`

          #### 🍎 macOS
          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-macos-x64${S}.dmg\` | Intel | macOS 12+ |
          | \`GeminiChat-macos-arm64${S}.dmg\` | Apple Silicon | macOS 12+ |

          > Open the DMG, drag **GeminiChat** to Applications, then launch from Finder or Spotlight.
          > If macOS says "unidentified developer": right-click → Open → Open anyway.

          #### 🐛 Debug Symbols
          | File | Platform |
          |------|---------|
          | \`GeminiChat-x64-win${S}.pdb.zip\` | Windows x64 |
          | \`GeminiChat-arm64-win${S}.pdb.zip\` | Windows ARM64 |
          | \`GeminiChat-x64-linux${S}.pdb.zip\` | Linux x64 |
          | \`GeminiChat-arm64-linux${S}.pdb.zip\` | Linux ARM64 |
          | \`GeminiChat-macos-x64${S}.pdb.zip\` | macOS Intel |
          | \`GeminiChat-macos-arm64${S}.pdb.zip\` | macOS Apple Silicon |

          > PDB files are portable debug symbols compatible with dotnet-dump, WinDbg, and JetBrains Rider.


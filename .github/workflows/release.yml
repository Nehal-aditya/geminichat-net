name: Release

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER RULES
#
# Stable:      git tag v1.2.3
# Pre-release: git tag v1.2.3-alpha.1 / -beta.2 / -rc.1 / -preview.1
# Manual:      Actions → Release → Run workflow
#
# ARTIFACTS PRODUCED PER RELEASE
# ┌─────────────────────────────────────────────┬────────────────────────────┐
# │ Windows                                     │ Linux                      │
# │  GeminiChat-x64.exe        portable         │  GeminiChat-x64.deb        │
# │  GeminiChat-arm64.exe      portable         │  GeminiChat-arm64.deb      │
# │  GeminiChat-x64.msi        installer        │  GeminiChat-x64.rpm        │
# │  GeminiChat-arm64.msi      installer        │  GeminiChat-arm64.rpm      │
# ├─────────────────────────────────────────────┼────────────────────────────┤
# │ macOS                                       │ Debug symbols (all)        │
# │  GeminiChat-macos-x64.dmg  Intel            │  GeminiChat-*.pdb.zip      │
# │  GeminiChat-macos-arm64.dmg Apple Silicon   │                            │
# └─────────────────────────────────────────────┴────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'
      - 'v[0-9]+.[0-9]+.[0-9]+-preview*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version — e.g. 1.2.3 or 1.2.3-beta.1'
        required: true
        default: '1.0.0'
      release_type:
        description: 'Release channel'
        required: true
        type: choice
        default: stable
        options: [stable, alpha, beta, rc, preview]
      draft:
        description: 'Publish as draft (review before going live)'
        required: true
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
env:
  APP_NAME:                    GeminiChat
  APP_ID:                      com.geminichat.app
  DOTNET_VERSION:              '8.0.x'
  PROJECT_PATH:                GeminiChat.csproj
  DOTNET_NOLOGO:               true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  WIX_VERSION:                 '5.0.2'
  WIX_UI_EXT_VERSION:          '5.0.1'
  APP_ICON:                    Assets/app.ico
  APP_ICON_PNG:                Assets/app.png
  DEB_MAINTAINER:              'GeminiChat <noreply@geminichat.app>'
  DEB_DESCRIPTION:             'AI chatbot powered by Google Gemini'
  RPM_SUMMARY:                 'AI chatbot powered by Google Gemini'
  # Fix Node.js 20 deprecation warnings on all runners
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Resolve version, channel, prerelease flag
  # ───────────────────────────────────────────────────────────────────────────
  version:
    name: Resolve Version & Channel
    runs-on: ubuntu-latest
    outputs:
      version:       ${{ steps.resolve.outputs.version }}
      tag:           ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      channel:       ${{ steps.resolve.outputs.channel }}
      is_draft:      ${{ steps.resolve.outputs.is_draft }}
      display_name:  ${{ steps.resolve.outputs.display_name }}
      msi_version:   ${{ steps.resolve.outputs.msi_version }}

    steps:
      - name: Resolve version metadata
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            IS_DRAFT="false"
          else
            VERSION="${{ github.event.inputs.version }}"
            RTYPE="${{ github.event.inputs.release_type }}"
            IS_DRAFT="${{ github.event.inputs.draft }}"
            if [[ "${RTYPE}" != "stable" && "${VERSION}" != *"-"* ]]; then
              VERSION="${VERSION}-${RTYPE}.1"
            fi
            TAG="v${VERSION}"
          fi

          IS_PRERELEASE="false"
          CHANNEL="stable"
          if   [[ "${VERSION}" == *"-alpha"*   ]]; then CHANNEL="alpha";   IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-beta"*    ]]; then CHANNEL="beta";    IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-rc"*      ]]; then CHANNEL="rc";      IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-preview"* ]]; then CHANNEL="preview"; IS_PRERELEASE="true"
          elif [[ "${VERSION}" == *"-"*        ]]; then CHANNEL="pre";     IS_PRERELEASE="true"
          fi

          MSI_VERSION="${VERSION%%-*}"

          case "${CHANNEL}" in
            alpha)   DISPLAY="Gemini Chat v${VERSION} (Alpha)" ;;
            beta)    DISPLAY="Gemini Chat v${VERSION} (Beta)" ;;
            rc)      DISPLAY="Gemini Chat v${VERSION} (Release Candidate)" ;;
            preview) DISPLAY="Gemini Chat v${VERSION} (Preview)" ;;
            pre)     DISPLAY="Gemini Chat v${VERSION} (Pre-release)" ;;
            *)       DISPLAY="Gemini Chat v${VERSION}" ;;
          esac

          echo "version=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                     >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}"             >> "$GITHUB_OUTPUT"
          echo "is_draft=${IS_DRAFT}"           >> "$GITHUB_OUTPUT"
          echo "display_name=${DISPLAY}"        >> "$GITHUB_OUTPUT"
          echo "msi_version=${MSI_VERSION}"     >> "$GITHUB_OUTPUT"

          echo "version=${VERSION}  tag=${TAG}  channel=${CHANNEL}  msi_version=${MSI_VERSION}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Windows: portable EXE + debug PDB (x64 + arm64)
  # ───────────────────────────────────────────────────────────────────────────
  build-exe:
    name: Windows EXE · ${{ matrix.arch_label }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            arch_label: x64
          - rid: win-arm64
            arch_label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish release EXE
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ApplicationIcon="${{ env.APP_ICON }}" `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            -p:InformationalVersion="${{ needs.version.outputs.version }}" `
            --output "publish/release/${{ matrix.rid }}"

      - name: Publish debug EXE (symbols)
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Debug `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            --output "publish/debug/${{ matrix.rid }}"

      - name: Rename & verify EXE
        shell: pwsh
        run: |
          $channel = "${{ needs.version.outputs.channel }}"
          $suffix  = if ($channel -ne "stable") { "-$channel" } else { "" }
          $src     = "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}.exe"
          $dst     = "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}-${{ matrix.arch_label }}${suffix}.exe"
          if (-not (Test-Path $src)) { throw "EXE not found: $src" }
          Move-Item $src $dst -Force
          Write-Host "EXE: $dst  ($([int](Get-Item $dst).Length / 1MB) MB)"

      - name: Collect PDB files
        shell: pwsh
        run: |
          $channel = "${{ needs.version.outputs.channel }}"
          $suffix  = if ($channel -ne "stable") { "-$channel" } else { "" }
          $zipName = "${{ env.APP_NAME }}-${{ matrix.arch_label }}-win${suffix}.pdb.zip"
          $pdbs    = Get-ChildItem "publish/debug/${{ matrix.rid }}" -Filter "*.pdb" -Recurse
          if ($pdbs.Count -gt 0) {
            Compress-Archive -Path ($pdbs.FullName) `
              -DestinationPath "publish/debug/$zipName" -Force
            Write-Host "PDB zip: $zipName ($($pdbs.Count) files)"
          } else { Write-Warning "No PDB files found" }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-win-${{ matrix.arch_label }}
          path: publish/release/${{ matrix.rid }}/*.exe
          retention-days: 3

      - name: Upload PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdb-win-${{ matrix.arch_label }}
          path: publish/debug/*.pdb.zip
          if-no-files-found: warn
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Windows MSI (x64 + arm64)
  # WiX v5.0.2 pinned, UI ext 5.0.1 fetched direct from NuGet.
  # Single-file publish + explicit <File> + [#MainExe] shortcuts.
  # ───────────────────────────────────────────────────────────────────────────
  build-msi:
    name: Windows MSI · ${{ matrix.arch_label }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        win-x64
            arch_label: x64
            wix_arch:   x64
          - rid:        win-arm64
            arch_label: arm64
            wix_arch:   arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WiX CLI v${{ env.WIX_VERSION }}
        run: dotnet tool install --global wix --version ${{ env.WIX_VERSION }}

      - name: Fetch WixToolset.UI.wixext v${{ env.WIX_UI_EXT_VERSION }}
        shell: pwsh
        run: |
          $pkg   = "WixToolset.UI.wixext"
          $ver   = "${{ env.WIX_UI_EXT_VERSION }}"
          $dest  = "wixext"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $url   = "https://www.nuget.org/api/v2/package/$pkg/$ver"
          $nupkg = "$dest/$pkg.$ver.nupkg"
          Invoke-WebRequest -Uri $url -OutFile $nupkg -UseBasicParsing
          Expand-Archive -Path $nupkg -DestinationPath "$dest/extracted" -Force
          $dll = Get-ChildItem "$dest/extracted" -Filter "WixToolset.UI.wixext.dll" -Recurse |
                   Where-Object { $_.FullName -match "wixext5" } | Select-Object -First 1
          if (-not $dll) {
            $dll = Get-ChildItem "$dest/extracted" -Filter "WixToolset.UI.wixext.dll" -Recurse |
                     Select-Object -First 1
          }
          if (-not $dll) { throw "WixToolset.UI.wixext.dll not found in package" }
          Write-Host "UI ext DLL: $($dll.FullName)"
          $dll.FullName | Out-File "wixext/ui_ext_dll.txt" -Encoding utf8 -NoNewline

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish (single-file for MSI)
        shell: pwsh
        run: |
          $msiVer = "${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ApplicationIcon="${{ env.APP_ICON }}" `
            -p:Version="${{ needs.version.outputs.version }}" `
            -p:AssemblyVersion="$msiVer" `
            -p:FileVersion="$msiVer" `
            -p:InformationalVersion="${{ needs.version.outputs.version }}" `
            --output "msi-src/${{ matrix.rid }}"
          $exe = "msi-src/${{ matrix.rid }}/${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem "msi-src/${{ matrix.rid }}" | ForEach-Object { Write-Host "  $($_.Name)" }
            throw "Expected EXE not found: $exe"
          }
          Write-Host "EXE ready: $exe  ($([int](Get-Item $exe).Length / 1MB) MB)"

      - name: Generate Product.wxs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path wix | Out-Null
          $msiVersion  = "${{ needs.version.outputs.msi_version }}"
          $channel     = "${{ needs.version.outputs.channel }}"
          $rid         = "${{ matrix.rid }}"
          $appName     = "${{ env.APP_NAME }}"
          $exeSrc      = "${{ github.workspace }}\msi-src\$rid\$appName.exe"
          $icoSrc      = "${{ github.workspace }}\${{ env.APP_ICON }}"
          $nameSuffix  = if ($channel -ne "stable") { " ($channel)" } else { "" }
          $displayName = "${appName}${nameSuffix}"
          $upgradeCode = if ($channel -eq "stable") {
            "A1B2C3D4-E5F6-7890-ABCD-EF1234567890"
          } else {
            "B2C3D4E5-F6A7-8901-BCDE-F01234567891"
          }
          $regKey = "Software\GeminiChat\$channel"

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"
              xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">
            <Package Name="$displayName" Manufacturer="GeminiChat"
                    Version="$msiVersion" UpgradeCode="$upgradeCode" Scope="perUser">
              <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />
              <MediaTemplate EmbedCab="yes" CompressionLevel="high" />
              <ui:WixUI Id="WixUI_InstallDir" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />
              <Icon Id="AppIcon.ico" SourceFile="$icoSrc" />
              <Property Id="ARPPRODUCTICON" Value="AppIcon.ico" />
              <Feature Id="MainFeature" Title="$appName" Level="1">
                <ComponentRef Id="MainExeComponent" />
                <ComponentRef Id="ShortcutComponent" />
              </Feature>
              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="INSTALLFOLDER" Name="$displayName" />
              </StandardDirectory>
              <StandardDirectory Id="DesktopFolder" />
              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="AppMenuFolder" Name="$displayName" />
              </StandardDirectory>
              <Component Id="MainExeComponent" Directory="INSTALLFOLDER"
                        Guid="D4E5F6A7-B8C9-0123-DEFA-123456789003">
                <File Id="MainExe" Source="$exeSrc" Name="$appName.exe" KeyPath="yes" />
              </Component>
              <Component Id="ShortcutComponent" Directory="INSTALLFOLDER"
                        Guid="E5F6A7B8-C9D0-1234-EFAB-234567890014">
                <RegistryValue Root="HKCU" Key="$regKey" Name="Installed"
                              Type="integer" Value="1" KeyPath="yes" />
                <Shortcut Id="DesktopShortcut" Directory="DesktopFolder"
                          Name="$displayName" Target="[#MainExe]"
                          WorkingDirectory="INSTALLFOLDER" Icon="AppIcon.ico" Advertise="no" />
                <Shortcut Id="StartMenuShortcut" Directory="AppMenuFolder"
                          Name="$appName" Target="[#MainExe]"
                          WorkingDirectory="INSTALLFOLDER" Icon="AppIcon.ico" Advertise="no" />
                <RemoveFolder Id="RemoveAppMenuFolder" Directory="AppMenuFolder" On="uninstall" />
              </Component>
            </Package>
          </Wix>
          "@
          Set-Content -Path "wix/Product.wxs" -Value $wxs -Encoding UTF8
          Write-Host "Generated Product.wxs  channel=$channel  arch=${{ matrix.wix_arch }}"

      - name: Build MSI
        shell: pwsh
        run: |
          $channel  = "${{ needs.version.outputs.channel }}"
          $suffix   = if ($channel -ne "stable") { "-$channel" } else { "" }
          $outName  = "${{ env.APP_NAME }}-${{ matrix.arch_label }}${suffix}.msi"
          $uiExtDll = (Get-Content "wixext/ui_ext_dll.txt" -Raw).Trim()
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build wix/Product.wxs -arch ${{ matrix.wix_arch }} -ext "$uiExtDll" -o "dist/$outName"
          $size = '{0:N1}' -f ((Get-Item "dist/$outName").Length / 1MB)
          Write-Host "Done: dist/$outName  (${size} MB)"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-win-${{ matrix.arch_label }}
          path: dist/*.msi
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Linux: .deb and .rpm (x64 + arm64)
  #
  # FIXES vs previous version:
  #   1. RPM spec %files uses %{buildroot} macros, not hardcoded /opt paths
  #   2. %install copies from the staged BUILD dir into %{buildroot}
  #   3. rpmbuild called with --nodeps (Ubuntu runner has no RPM runtime deps)
  #   4. Symlink created inside BUILDROOT not BUILD so rpmbuild finds it
  #   5. .deb control file uses printf instead of heredoc (avoids indent issues)
  #   6. Added dist/ mkdir before deb build
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux · ${{ matrix.arch_label }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        linux-x64
            arch_label: x64
            deb_arch:   amd64
            rpm_arch:   x86_64
          - rid:        linux-arm64
            arch_label: arm64
            deb_arch:   arm64
            rpm_arch:   aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev fakeroot rpm imagemagick

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish release binary
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            -p:FileVersion="${MSI_VER}" \
            -p:InformationalVersion="${{ needs.version.outputs.version }}" \
            --output "publish/release/${{ matrix.rid }}"

          BIN="publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: binary not found at $BIN"
            ls -la "publish/release/${{ matrix.rid }}/" && exit 1
          fi
          chmod +x "$BIN"
          echo "Binary: $BIN ($(du -sh "$BIN" | cut -f1))"

      - name: Publish debug binary (for symbols)
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Debug \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=portable \
            -p:DebugSymbols=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            --output "publish/debug/${{ matrix.rid }}"

      - name: Collect PDB files
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          ZIP_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}-linux${SUFFIX}.pdb.zip"
          PDBS=$(find "publish/debug/${{ matrix.rid }}" -name "*.pdb" 2>/dev/null || true)
          if [ -n "$PDBS" ]; then
            # shellcheck disable=SC2086
            zip -j "publish/debug/${ZIP_NAME}" $PDBS
            echo "PDB zip: ${ZIP_NAME}"
          else
            echo "WARNING: no .pdb files found"
          fi

      - name: Prepare icon
        run: |
          ICON_SRC="${{ env.APP_ICON_PNG }}"
          if [ ! -f "$ICON_SRC" ] && [ -f "${{ env.APP_ICON }}" ]; then
            convert "${{ env.APP_ICON }}"[0] -resize 256x256 assets_icon.png
            ICON_SRC="assets_icon.png"
          elif [ ! -f "$ICON_SRC" ]; then
            convert -size 256x256 xc:'#1E3A8A' \
              -fill '#60A5FA' -font DejaVu-Sans-Bold -pointsize 120 \
              -gravity center -annotate 0 'G' assets_icon.png
            ICON_SRC="assets_icon.png"
          fi
          cp "$ICON_SRC" package_icon.png
          echo "Icon ready: package_icon.png"

      # ── .deb ──────────────────────────────────────────────────────────────
      # FIX: use printf for control file to avoid leading-whitespace issues
      # that cause dpkg-deb to reject the package.
      - name: Build .deb
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          PKG_NAME=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          PKG_VER="${{ needs.version.outputs.msi_version }}"
          DEB_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}${SUFFIX}.deb"
          INSTALL_DIR="/opt/${PKG_NAME}"
          STAGE="deb_stage"

          mkdir -p "${STAGE}/DEBIAN"
          mkdir -p "${STAGE}${INSTALL_DIR}"
          mkdir -p "${STAGE}/usr/local/bin"
          mkdir -p "${STAGE}/usr/share/applications"
          mkdir -p "${STAGE}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p dist

          # Binary
          cp "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}" \
             "${STAGE}${INSTALL_DIR}/${{ env.APP_NAME }}"
          chmod 755 "${STAGE}${INSTALL_DIR}/${{ env.APP_NAME }}"

          # Symlink (relative target so it works inside fakeroot)
          ln -s "${INSTALL_DIR}/${{ env.APP_NAME }}" \
                "${STAGE}/usr/local/bin/${PKG_NAME}"

          # Icon
          cp package_icon.png \
             "${STAGE}/usr/share/icons/hicolor/256x256/apps/${PKG_NAME}.png"

          # .desktop (no leading whitespace — desktop files are sensitive to it)
          DISPLAY_SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && DISPLAY_SUFFIX=" (${CHANNEL^})"
          cat > "${STAGE}/usr/share/applications/${PKG_NAME}.desktop" <<-DESKTOP
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=${{ env.APP_NAME }}${DISPLAY_SUFFIX}
          Comment=${{ env.DEB_DESCRIPTION }}
          Exec=${INSTALL_DIR}/${{ env.APP_NAME }}
          Icon=${PKG_NAME}
          Terminal=false
          Categories=Network;Chat;Utility;
          StartupWMClass=${{ env.APP_NAME }}
          DESKTOP

          # control file — printf avoids any shell indentation leaking into file
          INSTALLED_SIZE=$(du -sk "${STAGE}${INSTALL_DIR}" | cut -f1)
          printf 'Package: %s\nVersion: %s\nArchitecture: %s\nMaintainer: %s\nInstalled-Size: %s\nDepends: libx11-6, libice6, libsm6, libfontconfig1\nSection: net\nPriority: optional\nHomepage: https://github.com/%s\nDescription: %s\n Google Gemini powered AI chatbot with streaming responses,\n persistent chat history, and support for multiple models.\n' \
            "${PKG_NAME}" "${PKG_VER}" "${{ matrix.deb_arch }}" \
            "${{ env.DEB_MAINTAINER }}" "${INSTALLED_SIZE}" \
            "${{ github.repository }}" "${{ env.DEB_DESCRIPTION }}" \
            > "${STAGE}/DEBIAN/control"

          # postinst
          printf '#!/bin/sh\nset -e\ncommand -v gtk-update-icon-cache >/dev/null 2>&1 && gtk-update-icon-cache -f -t /usr/share/icons/hicolor || true\ncommand -v update-desktop-database >/dev/null 2>&1 && update-desktop-database /usr/share/applications || true\n' \
            > "${STAGE}/DEBIAN/postinst"
          chmod 755 "${STAGE}/DEBIAN/postinst"

          # postrm
          printf '#!/bin/sh\nset -e\ncommand -v gtk-update-icon-cache >/dev/null 2>&1 && gtk-update-icon-cache -f -t /usr/share/icons/hicolor || true\n' \
            > "${STAGE}/DEBIAN/postrm"
          chmod 755 "${STAGE}/DEBIAN/postrm"

          fakeroot dpkg-deb --build "${STAGE}" "dist/${DEB_NAME}"
          echo "Built: dist/${DEB_NAME}  ($(du -sh "dist/${DEB_NAME}" | cut -f1))"

      # ── .rpm ──────────────────────────────────────────────────────────────
      # FIXES:
      #   1. All staged files go into BUILDROOT (not BUILD) so %files macros work
      #   2. %files uses RPM macros (%{_prefix}, %{_datadir}) not hardcoded paths
      #   3. rpmbuild --nodeps so Ubuntu's missing RPM runtime libs don't fail it
      #   4. %install uses cp from a clean source dir, not from BUILD
      - name: Build .rpm
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          PKG_NAME=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          PKG_VER="${{ needs.version.outputs.msi_version }}"
          RPM_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}${SUFFIX}.rpm"
          INSTALL_DIR="/opt/${PKG_NAME}"

          RPM_ROOT="${HOME}/rpmbuild"
          mkdir -p "${RPM_ROOT}"/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

          # Stage source files in a clean directory (separate from BUILDROOT)
          SRC="${RPM_ROOT}/SOURCES/${PKG_NAME}"
          mkdir -p "${SRC}${INSTALL_DIR}"
          mkdir -p "${SRC}/usr/local/bin"
          mkdir -p "${SRC}/usr/share/applications"
          mkdir -p "${SRC}/usr/share/icons/hicolor/256x256/apps"

          cp "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}" \
             "${SRC}${INSTALL_DIR}/${{ env.APP_NAME }}"
          chmod 755 "${SRC}${INSTALL_DIR}/${{ env.APP_NAME }}"
          cp package_icon.png \
             "${SRC}/usr/share/icons/hicolor/256x256/apps/${PKG_NAME}.png"

          DISPLAY_SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && DISPLAY_SUFFIX=" (${CHANNEL^})"
          cat > "${SRC}/usr/share/applications/${PKG_NAME}.desktop" <<-DESKTOP
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=${{ env.APP_NAME }}${DISPLAY_SUFFIX}
          Comment=${{ env.RPM_SUMMARY }}
          Exec=${INSTALL_DIR}/${{ env.APP_NAME }}
          Icon=${PKG_NAME}
          Terminal=false
          Categories=Network;Chat;Utility;
          StartupWMClass=${{ env.APP_NAME }}
          DESKTOP

          # Symlink — must exist in source so the %install cp picks it up
          ln -sf "${INSTALL_DIR}/${{ env.APP_NAME }}" \
                 "${SRC}/usr/local/bin/${PKG_NAME}"

          # SPEC file
          # FIX 1: Shell variables (${SRC}, ${INSTALL_DIR}, ${PKG_NAME}) are
          #         expanded by bash when writing this heredoc, so they become
          #         literal strings in the spec — safe and correct.
          # FIX 2: BuildArch sets the RPM metadata arch (aarch64 / x86_64).
          # FIX 3: rpmbuild --target tells the host to package for the given
          #         arch without needing a cross-compiler (we package a
          #         pre-built binary, so no compilation happens).
          # FIX 4: %define _build_arch + %define _host_cpu suppress the
          #         "No compatible architectures" check that fires when the
          #         host arch (x86_64) differs from BuildArch (aarch64).
          cat > "${RPM_ROOT}/SPECS/${PKG_NAME}.spec" <<-SPEC
          Name:           ${PKG_NAME}
          Version:        ${PKG_VER}
          Release:        1
          Summary:        ${{ env.RPM_SUMMARY }}
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          BuildArch:      ${{ matrix.rpm_arch }}

          %description
          Google Gemini powered AI chatbot with streaming responses,
          persistent chat history, and multiple model support.

          %install
          mkdir -p %{buildroot}
          cp -a ${SRC}/. %{buildroot}/

          %files
          /usr/local/bin/${PKG_NAME}
          ${INSTALL_DIR}/${{ env.APP_NAME }}
          /usr/share/applications/${PKG_NAME}.desktop
          /usr/share/icons/hicolor/256x256/apps/${PKG_NAME}.png

          %post
          /usr/bin/gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true
          /usr/bin/update-desktop-database /usr/share/applications 2>/dev/null || true

          %postun
          /usr/bin/gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true
          SPEC

          rpmbuild -bb \
            --nodeps \
            --target "${{ matrix.rpm_arch }}-linux-gnu" \
            --define "_topdir ${RPM_ROOT}" \
            --define "_build_arch ${{ matrix.rpm_arch }}" \
            --define "_host_cpu ${{ matrix.rpm_arch }}" \
            "${RPM_ROOT}/SPECS/${PKG_NAME}.spec"

          RPM_FILE=$(find "${RPM_ROOT}/RPMS" -name "*.rpm" | head -1)
          if [ -z "$RPM_FILE" ]; then
            echo "ERROR: rpmbuild produced no .rpm" && exit 1
          fi
          mkdir -p dist
          cp "$RPM_FILE" "dist/${RPM_NAME}"
          echo "Built: dist/${RPM_NAME}  ($(du -sh "dist/${RPM_NAME}" | cut -f1))"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-linux-${{ matrix.arch_label }}
          path: dist/*.deb
          retention-days: 3

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-linux-${{ matrix.arch_label }}
          path: dist/*.rpm
          retention-days: 3

      - name: Upload Linux PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdb-linux-${{ matrix.arch_label }}
          path: publish/debug/*.pdb.zip
          if-no-files-found: warn
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — macOS: .dmg (Intel x64 + Apple Silicon arm64)
  #
  # FIXES vs previous version:
  #   1. hdiutil create uses -ov to overwrite and quotes all paths
  #   2. DMG staging dir moved to $RUNNER_TEMP (avoids workspace path issues)
  #   3. App bundle built step-by-step with explicit error checks
  #   4. sips icon conversion wrapped in || true so missing icon doesn't fail
  #   5. hdiutil convert output path quoted to handle any spaces
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG · ${{ matrix.arch_label }}
    needs: version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid:        osx-x64
            arch_label: macos-x64
          - rid:        osx-arm64
            arch_label: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish release binary
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            -p:FileVersion="${MSI_VER}" \
            -p:InformationalVersion="${{ needs.version.outputs.version }}" \
            --output "publish/release/${{ matrix.rid }}"

          BIN="publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}"
          [ ! -f "$BIN" ] && { echo "ERROR: $BIN not found"; ls "publish/release/${{ matrix.rid }}/"; exit 1; }
          chmod +x "$BIN"
          echo "Binary ready: $BIN ($(du -sh "$BIN" | cut -f1))"

      - name: Publish debug binary (symbols)
        run: |
          MSI_VER="${{ needs.version.outputs.msi_version }}"
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Debug \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=portable \
            -p:DebugSymbols=true \
            -p:Version="${{ needs.version.outputs.version }}" \
            -p:AssemblyVersion="${MSI_VER}" \
            --output "publish/debug/${{ matrix.rid }}"

      - name: Collect PDB files
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          ZIP_NAME="${{ env.APP_NAME }}-${{ matrix.arch_label }}${SUFFIX}.pdb.zip"
          mkdir -p publish/debug
          PDBS=$(find "publish/debug/${{ matrix.rid }}" -name "*.pdb" 2>/dev/null || true)
          if [ -n "$PDBS" ]; then
            # shellcheck disable=SC2086
            zip -j "publish/debug/${ZIP_NAME}" $PDBS
            echo "PDB zip: ${ZIP_NAME}"
          else
            echo "WARNING: no .pdb files found"
          fi

      # ── .app bundle ───────────────────────────────────────────────────────
      - name: Build .app bundle
        run: |
          APP_VER="${{ needs.version.outputs.msi_version }}"
          CHANNEL="${{ needs.version.outputs.channel }}"
          BUNDLE_ID="${{ env.APP_ID }}"
          APP_BUNDLE="${{ github.workspace }}/${{ env.APP_NAME }}.app"

          DISPLAY_SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && DISPLAY_SUFFIX=" (${CHANNEL^})"

          # Directory structure
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"

          # Binary
          cp "publish/release/${{ matrix.rid }}/${{ env.APP_NAME }}" \
             "${APP_BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"
          chmod +x "${APP_BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"

          # Info.plist
          cat > "${APP_BUNDLE}/Contents/Info.plist" <<-PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>      <string>${BUNDLE_ID}</string>
            <key>CFBundleName</key>            <string>${{ env.APP_NAME }}${DISPLAY_SUFFIX}</string>
            <key>CFBundleDisplayName</key>     <string>${{ env.APP_NAME }}${DISPLAY_SUFFIX}</string>
            <key>CFBundleExecutable</key>      <string>${{ env.APP_NAME }}</string>
            <key>CFBundleVersion</key>         <string>${APP_VER}</string>
            <key>CFBundleShortVersionString</key> <string>${APP_VER}</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>CFBundleIconFile</key>        <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>  <string>12.0</string>
            <key>NSHighResolutionCapable</key> <true/>
          </dict>
          </plist>
          PLIST

          # Icon: PNG → iconset → .icns using sips + iconutil (built into macOS)
          ICON_SRC=""
          if   [ -f "${{ env.APP_ICON_PNG }}" ]; then ICON_SRC="${{ env.APP_ICON_PNG }}"
          elif [ -f "${{ env.APP_ICON }}" ];     then
            sips -s format png "${{ env.APP_ICON }}" --out /tmp/appicon_src.png 2>/dev/null || true
            [ -f /tmp/appicon_src.png ] && ICON_SRC="/tmp/appicon_src.png"
          fi

          if [ -n "${ICON_SRC}" ]; then
            ICONSET="/tmp/${{ env.APP_NAME }}.iconset"
            mkdir -p "${ICONSET}"
            for SIZE in 16 32 64 128 256 512; do
              sips -z ${SIZE} ${SIZE} "${ICON_SRC}" \
                --out "${ICONSET}/icon_${SIZE}x${SIZE}.png"       2>/dev/null || true
              sips -z $((SIZE*2)) $((SIZE*2)) "${ICON_SRC}" \
                --out "${ICONSET}/icon_${SIZE}x${SIZE}@2x.png"   2>/dev/null || true
            done
            iconutil -c icns "${ICONSET}" \
              -o "${APP_BUNDLE}/Contents/Resources/AppIcon.icns" 2>/dev/null || true
            echo "Icon converted to AppIcon.icns"
          else
            echo "No icon source found, continuing without icon"
          fi

          echo "App bundle contents:"
          ls -lhR "${APP_BUNDLE}/Contents/"

      # ── .dmg ─────────────────────────────────────────────────────────────
      # FIX: use $RUNNER_TEMP for staging (no spaces, guaranteed writable),
      # quote all hdiutil paths, and use -ov flag to allow overwriting.
      - name: Build .dmg
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          SUFFIX=""
          [ "${CHANNEL}" != "stable" ] && SUFFIX="-${CHANNEL}"
          APP_NAME="${{ env.APP_NAME }}"
          DMG_NAME="${APP_NAME}-${{ matrix.arch_label }}${SUFFIX}.dmg"
          DMG_TITLE="${APP_NAME} ${{ needs.version.outputs.msi_version }}"
          STAGING="${RUNNER_TEMP}/dmg_staging"
          DMG_RW="${RUNNER_TEMP}/${APP_NAME}_rw.dmg"
          APP_BUNDLE="${{ github.workspace }}/${APP_NAME}.app"

          mkdir -p "${STAGING}" dist

          # Copy .app bundle into staging
          cp -R "${APP_BUNDLE}" "${STAGING}/${APP_NAME}.app"

          # /Applications symlink for drag-install
          ln -sf /Applications "${STAGING}/Applications"

          echo "Staging contents:"
          ls -la "${STAGING}/"

          # Create read-write DMG from staging folder
          hdiutil create \
            -volname "${DMG_TITLE}" \
            -srcfolder "${STAGING}" \
            -ov \
            -format UDRW \
            "${DMG_RW}"

          # Convert to compressed read-only DMG
          hdiutil convert \
            "${DMG_RW}" \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "dist/${DMG_NAME}"

          SIZE=$(du -sh "dist/${DMG_NAME}" | cut -f1)
          echo "Built: dist/${DMG_NAME}  (${SIZE})"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch_label }}
          path: dist/*.dmg
          retention-days: 3

      - name: Upload macOS PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdb-macos-${{ matrix.arch_label }}
          path: publish/debug/*.pdb.zip
          if-no-files-found: warn
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — Create GitHub Release
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [version, build-exe, build-msi, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate release notes
        shell: bash
        run: |
          CHANNEL="${{ needs.version.outputs.channel }}"
          VERSION="${{ needs.version.outputs.version }}"

          case "${CHANNEL}" in
            alpha)   BANNER="⚠️ **Alpha** — Early preview. May be unstable. Not for production." ;;
            beta)    BANNER="🔶 **Beta** — Feature-complete but may contain bugs. Feedback welcome." ;;
            rc)      BANNER="🔷 **Release Candidate** — Please test and report issues before stable." ;;
            preview) BANNER="🔵 **Preview** — Showcases upcoming features. May change before stable." ;;
            *)       BANNER="✅ **Stable Release** — Recommended for all users." ;;
          esac

          S=""
          [ "${CHANNEL}" != "stable" ] && S="-${CHANNEL}"

          cat > release_notes.md << EOMD
          ## ${{ needs.version.outputs.display_name }}

          ${BANNER}

          ---

          ### 📦 Downloads

          #### 🪟 Windows
          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-x64${S}.exe\` | x86-64 | Portable — run directly |
          | \`GeminiChat-arm64${S}.exe\` | ARM64 | Portable — run directly |
          | \`GeminiChat-x64${S}.msi\` | x86-64 | Installer — Desktop + Start Menu shortcuts |
          | \`GeminiChat-arm64${S}.msi\` | ARM64 | Installer — Desktop + Start Menu shortcuts |

          > MSI installs to \`%LocalAppData%\\GeminiChat\` — no administrator rights required.

          #### 🐧 Linux
          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-x64${S}.deb\` | x86-64 | Debian / Ubuntu / Mint |
          | \`GeminiChat-arm64${S}.deb\` | ARM64 | Debian / Ubuntu / Mint |
          | \`GeminiChat-x64${S}.rpm\` | x86-64 | Fedora / RHEL / openSUSE |
          | \`GeminiChat-arm64${S}.rpm\` | ARM64 | Fedora / RHEL / openSUSE |

          > \`sudo dpkg -i GeminiChat-x64${S}.deb\` · \`sudo rpm -i GeminiChat-x64${S}.rpm\`

          #### 🍎 macOS
          | File | Architecture | Type |
          |------|-------------|------|
          | \`GeminiChat-macos-x64${S}.dmg\` | Intel | macOS 12+ |
          | \`GeminiChat-macos-arm64${S}.dmg\` | Apple Silicon | macOS 12+ |

          > Open the DMG and drag **GeminiChat** to Applications. If macOS blocks it: right-click → Open.

          #### 🐛 Debug Symbols
          | File | Platform |
          |------|---------|
          | \`GeminiChat-x64-win${S}.pdb.zip\` | Windows x64 |
          | \`GeminiChat-arm64-win${S}.pdb.zip\` | Windows ARM64 |
          | \`GeminiChat-x64-linux${S}.pdb.zip\` | Linux x64 |
          | \`GeminiChat-arm64-linux${S}.pdb.zip\` | Linux ARM64 |
          | \`GeminiChat-macos-x64${S}.pdb.zip\` | macOS Intel |
          | \`GeminiChat-macos-arm64${S}.pdb.zip\` | macOS Apple Silicon |

          ---

          ### 🤖 Supported Models

          | Model | API ID |
          |-------|--------|
          | Gemini 2.5 Flash | \`gemini-2.5-flash\` |
          | Gemini 2.5 Pro | \`gemini-2.5-pro\` |
          | Gemini 2.5 Flash Lite | \`gemini-2.5-flash-lite\` |
          | Gemini 3 Flash | \`gemini-3-flash-preview\` |
          | Gemini 3.1 Pro | \`gemini-3.1-pro-preview\` |
          | Gemini 3.1 Flash Lite | \`gemini-3.1-flash-lite-preview\` |

          ---

          ### 🚀 Getting Started

          1. Download the installer for your platform
          2. Get a free API key at [aistudio.google.com/apikey](https://aistudio.google.com/apikey)
          3. Launch **Gemini Chat**, paste your key, click **Validate & Save**

          ---

          **Full changelog:** [\`${VERSION}\`](../../commits/${{ needs.version.outputs.tag }})
          EOMD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.version.outputs.tag }}
          name:        ${{ needs.version.outputs.display_name }}
          body_path:   release_notes.md
          draft:       ${{ needs.version.outputs.is_draft }}
          prerelease:  ${{ needs.version.outputs.is_prerelease }}
          make_latest: ${{ needs.version.outputs.is_prerelease == 'false' }}
          files: |
            artifacts/exe-win-x64/*.exe
            artifacts/exe-win-arm64/*.exe
            artifacts/msi-win-x64/*.msi
            artifacts/msi-win-arm64/*.msi
            artifacts/deb-linux-x64/*.deb
            artifacts/deb-linux-arm64/*.deb
            artifacts/rpm-linux-x64/*.rpm
            artifacts/rpm-linux-arm64/*.rpm
            artifacts/dmg-macos-x64/*.dmg
            artifacts/dmg-macos-arm64/*.dmg
            artifacts/pdb-win-x64/*.pdb.zip
            artifacts/pdb-win-arm64/*.pdb.zip
            artifacts/pdb-linux-x64/*.pdb.zip
            artifacts/pdb-linux-arm64/*.pdb.zip
            artifacts/pdb-macos-macos-x64/*.pdb.zip
            artifacts/pdb-macos-macos-arm64/*.pdb.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}